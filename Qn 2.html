<!DOCTYPE html>
<html>
    <head>
        <title>HTML Text Formating Tags</title>
    </head>
<table border="1"> 
<tr>
    <th>Tag</th>
    <th>Example</th>
</tr>

<tr>
    <td>&lt;b&gt;</td>
    <td><b>Bold text</b></td>
</tr>

<tr>
    <td>&lt;i&gt;</td>
    <td><i>Italic Text</i></td>
</tr>

<tr>
    <td>&lt;u&gt;</td>
    <td><u>Underlined</u></td>
</tr>

<tr>
    <td>&lt;mark&gt;</td>
    <td><mark>Highlighted</mark></td>
</tr>

</table>
</html>
