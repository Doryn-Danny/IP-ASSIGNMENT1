<!DOCTYPE html>
<html>
    <head>
        <title>Lists</title>
    </head>
    <body>
        
       <h3>Ordered List</h3>
       <ol type="i">
        <p>Course List</p>
         <li>HTML</li>
         <li>CSS</li>
         <li>JavaScript</li>
         <li>MySQL</li>
       </ol>

       <h3>Unordered List</h3>
     <ul type="square">
        <p>Fruits Lists</p>
       <li>Apple</li>
       <li>Banana</li>
       <li>Orange</li>
    </ul>
    </body>
</html>
